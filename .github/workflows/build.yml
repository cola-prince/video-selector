name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: video-selector-linux-x64
            executable: dist/video-selector
            package: video-selector-linux-x64.tar.gz
          - os: windows-latest
            artifact: video-selector-windows-x64
            executable: dist/video-selector.exe
            package: video-selector-windows-x64.zip
          - os: macos-15
            artifact: video-selector-macos-arm64
            executable: dist/video-selector
            package: video-selector-macos-arm64.tar.gz
          - os: macos-15-intel
            artifact: video-selector-macos-x64
            executable: dist/video-selector
            package: video-selector-macos-x64.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Locate ffprobe
        id: ffprobe
        shell: pwsh
        run: |
          $ffprobeBin = (Get-Command ffprobe -ErrorAction Stop).Source
          & $ffprobeBin -version
          "bin=$ffprobeBin" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Build executable
        shell: bash
        env:
          FFPROBE_BIN: ${{ steps.ffprobe.outputs.bin }}
        run: uv run --with pyinstaller pyinstaller --clean --noconfirm video_selector.spec

      - name: Package executable
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            Compress-Archive -Path "${{ matrix.executable }}" -DestinationPath "${{ matrix.package }}" -Force
          } else {
            chmod +x "${{ matrix.executable }}"
            tar -czf "${{ matrix.package }}" -C dist video-selector
          }

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.package }}
          if-no-files-found: error
